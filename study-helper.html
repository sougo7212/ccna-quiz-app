<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CCNA Study Helper</title>
  <link rel="stylesheet" href="study-helper.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero-card">
      <p class="eyebrow">CCNA Study Helper</p>
      <h1>問題番号だけで AI 用の解説プロンプトを作る</h1>
      <p class="lede">iPhone と iPad で使う前提の軽い補助ページです。問題番号を入れると、問題文と選択肢を表示し、そのまま ChatGPT や Claude に渡せる文章を作ります。</p>
      <form class="lookup-form" id="lookupForm">
        <label for="questionId" class="field-label">問題番号</label>
        <div class="lookup-row">
          <input id="questionId" name="questionId" type="number" min="1" inputmode="numeric" placeholder="57">
          <button type="submit" class="primary-button">表示する</button>
        </div>
      </form>
      <p class="status-text" id="statusText">`data/questions.json` を読み込み中です。</p>
    </section>

    <section class="panel-grid">
      <article class="panel">
        <div class="panel-header">
          <p class="panel-title">問題データ</p>
          <p class="panel-subtitle" id="questionMeta">未選択</p>
        </div>
        <div class="question-card" id="questionCard">
          <p class="placeholder">問題番号を入れると、ここに問題文と選択肢を表示します。</p>
        </div>
      </article>

      <article class="panel">
        <div class="panel-header">
          <p class="panel-title">AI 用プロンプト</p>
          <p class="panel-subtitle">コピーしてそのまま貼れる形式</p>
        </div>
        <div class="action-row">
          <button type="button" class="secondary-button" id="copyPromptButton" disabled>コピー</button>
          <button type="button" class="secondary-button" id="sharePromptButton" disabled>共有</button>
        </div>
        <textarea id="promptOutput" class="prompt-output" readonly placeholder="ここに生成されたプロンプトが入ります。"></textarea>
      </article>
    </section>
  </main>

  <script src="study-helper.js"></script>
</body>
</html>
